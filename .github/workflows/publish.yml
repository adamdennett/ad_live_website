name: Render and publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr2
            any::jsonlite
            any::dplyr
            any::purrr
            any::htmltools
            any::lubridate
            any::yaml
            any::stringr
            any::knitr
            any::rmarkdown

      - name: Render and publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          # Provided automatically by Actions; the projects page picks it up
          # via Sys.getenv("GITHUB_TOKEN") so the GitHub API call isn't
          # rate-limited.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
