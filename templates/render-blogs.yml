name: Render blog posts

# ---------------------------------------------------------------------------
# Template: auto-render blog*.qmd in any of Adam's project repos.
# Drop this file in any repo as .github/workflows/render-blogs.yml.
# On every push that touches a blog*.qmd at the repo root, GitHub Actions
# renders it via Quarto, applies the adamdennett.co.uk styling via
# `_blog-format.yml` (which references `_blog-style.css`), and commits
# the resulting HTML to docs/, where GitHub Pages picks it up. The
# adamdennett.co.uk Blog page then discovers the rendered output on its
# next render.
#
# Prerequisites in the target repo (see templates/README.md for the
# full checklist):
# - Pages enabled, source = main/docs
# - _quarto.yml has `output-dir: docs`
# - _blog-style.css and _blog-format.yml at repo root (copied from
#   ad_live_website/templates/)
# - docs/.nojekyll exists (so files starting with `_` aren't filtered)
# - .gitignore does NOT exclude docs/
#
# If a blog post uses R code chunks, uncomment the `setup-r` /
# `setup-r-dependencies` steps below and list the packages it needs.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
    paths:
      - 'blog*.qmd'
      - '_blog-style.css'
      - '_blog-format.yml'
      - '.github/workflows/render-blogs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      # Uncomment if any blog post uses R code chunks.
      #
      # - uses: r-lib/actions/setup-r@v2
      #   with:
      #     r-version: '4.5.2'
      #     use-public-rspm: true
      #
      # - uses: r-lib/actions/setup-r-dependencies@v2
      #   with:
      #     packages: |
      #       any::tidyverse
      #       any::knitr
      #       any::rmarkdown

      - name: Render every blog*.qmd
        run: |
          shopt -s nullglob
          for f in blog*.qmd; do
            echo "::group::Rendering $f"
            # --metadata-file layers the site styling on top of the qmd's
            # own front-matter — only blog posts pick it up, other qmds
            # in the project are unaffected.
            quarto render "$f" --metadata-file _blog-format.yml
            echo "::endgroup::"
          done

      - name: Commit rendered HTML + style assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage rendered HTML, any _files dir Quarto created, and the
          # CSS Quarto copied alongside (so Pages serves it).
          find docs -maxdepth 3 \
            \( -name 'blog*.html' -o -name 'blog*_files' -o -name '_blog-style.css' \) \
            -print 2>/dev/null | while read f; do
            git add "$f"
          done
          if ! git diff --staged --quiet; then
            git commit -m "Auto-render blog posts [skip ci]"
            git push
          else
            echo "Nothing staged — nothing to commit."
          fi
